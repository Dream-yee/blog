<!DOCTYPE html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Browse all article posts with tag filtering, search, and sorting on this Markdown-powered blog." />
    <meta name="robots" content="index, follow" />
    <meta property="og:title" content="文章瀏覽 | Dreamyee's blog" />
    <meta property="og:description" content="Browse all article posts with tag filtering, search, and sorting on this Markdown-powered blog." />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="theme-color" content="#080812" />
    <title>文章瀏覽 | Dreamyee's blog</title>
    <script>
      (() => {
        try {
          const themes = {
            purple: "#080812",
            blue: "#06101f",
            green: "#061812",
          };
          const savedTheme = localStorage.getItem("blog-theme");
          if (Object.prototype.hasOwnProperty.call(themes, savedTheme)) {
            document.documentElement.dataset.theme = savedTheme;
            document.querySelector('meta[name="theme-color"]').setAttribute("content", themes[savedTheme]);
          }
        } catch (error) {
          document.documentElement.dataset.theme = "blue";
        }
      })();
    </script>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="page-shell">
      <header class="hero-banner archive-banner">
        <div class="hero-overlay"></div>
        <div class="topbar">
          <a class="brand nav-link" href="index.html">Dreamyee</a>
          <div class="nav-actions">
            <div class="theme-switcher">
              <button class="theme-trigger" type="button" aria-label="選擇主題色" aria-expanded="false" aria-controls="themeMenu">
                <span class="theme-trigger-swatch" aria-hidden="true"></span>
                <span class="theme-trigger-chevron" aria-hidden="true"></span>
              </button>
              <div class="theme-menu" id="themeMenu" role="menu" hidden>
                <button class="theme-option" type="button" data-theme-choice="purple" role="menuitemradio" aria-checked="true">
                  <span class="theme-option-swatch theme-purple" aria-hidden="true"></span>
                  <span>紫色</span>
                </button>
                <button class="theme-option" type="button" data-theme-choice="blue" role="menuitemradio" aria-checked="false">
                  <span class="theme-option-swatch theme-blue" aria-hidden="true"></span>
                  <span>深藍</span>
                </button>
                <button class="theme-option" type="button" data-theme-choice="green" role="menuitemradio" aria-checked="false">
                  <span class="theme-option-swatch theme-green" aria-hidden="true"></span>
                  <span>深綠</span>
                </button>
              </div>
            </div>
            <a class="nav-link" href="archive.html">文章瀏覽</a>
          </div>
        </div>
        <div class="hero-content">
          <p class="eyebrow">文章瀏覽</p>
          <h1>你可以在這裡搜尋文章</h1>
          <p class="post-meta">把我扒開來看</p>
        </div>
      </header>

      <main class="content-area archive-content">
        <section class="browse-panel">
          <div class="browse-controls">
            <input id="searchInput" type="search" placeholder="搜尋標題、摘要或標籤" autocomplete="off" />
            <div class="sort-row">
              <label for="sortOrder">排序：</label>
              <select id="sortOrder">
                <option value="newest">最新發布</option>
                <option value="oldest">最早發布</option>
              </select>
            </div>
          </div>

          <div class="tag-filter" id="tagFilter"></div>
        </section>

        <section class="article-list" id="articleList"></section>
      </main>
    </div>

    <script src="theme.js"></script>
    <script src="archive.js"></script>
  </body>
</html>
