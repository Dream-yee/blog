<!DOCTYPE html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dreamyee's blog</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="page-shell">
      <header class="hero-banner" id="heroBanner">
        <div class="hero-overlay"></div>
        <div class="topbar">
          <a class="brand nav-link" href="index.html">Dreamyee</a>
          <a class="nav-link" href="archive.html">文章瀏覽</a>
        </div>
        <div class="hero-content">
          <p class="eyebrow">Dreamyee's blog</p>
          <h1 id="postTitle">Loading ...</h1>
          <p id="postMeta" class="post-meta"></p>
        </div>
      </header>

      <main class="content-area">
        <article class="post-card">
          <div class="post-meta-row">
            <span id="postLength"></span>
            <span id="postDates"></span>
          </div>
          <div class="tag-list" id="tagList"></div>
          <div class="post-body" id="postBody"></div>
        </article>
      </main>
    </div>

    <script src="script.js"></script>
  </body>
</html>
